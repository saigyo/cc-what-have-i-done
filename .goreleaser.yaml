# GoReleaser configuration — https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ccwhid
    main: ./cmd/ccwhid
    binary: ccwhid
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: ccwhid
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  # Delegate to GitHub's native release-notes generator so each release lists
  # the pull requests merged since the previous tag, with contributors and a
  # full-changelog link. Categorisation is configured in .github/release.yml.
  use: github-native

release:
  draft: false
  prerelease: auto
